name: Test & Validate PDF2Word Pro

# Runs on every push and pull request to ensure the app starts correctly.
on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  test:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "
          from src.analyzer import PDFAnalyzer
          from src.builder import WordBuilder
          from src.converter import PDF2WordConverter
          from app import app
          print('All imports OK')
          "

      - name: Smoke-test Flask starts
        run: |
          python -c "
          from app import app
          client = app.test_client()
          res = client.get('/')
          assert res.status_code == 200, f'Expected 200, got {res.status_code}'
          print('Flask OK — homepage returned 200')
          "
